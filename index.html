<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌌 COSMIC QUIZ WARS | مستويات المعرفة الكونية</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', 'Orbitron', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        @keyframes starsFloat {
            0% { transform: translateY(0px) translateX(0px); opacity: 1; }
            50% { transform: translateY(-20px) translateX(10px); opacity: 0.5; }
            100% { transform: translateY(0px) translateX(0px); opacity: 1; }
        }
        
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: starsFloat 3s ease-in-out infinite;
        }
        
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            width: 100%;
            background: rgba(10, 20, 40, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 2px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        .panel { padding: 30px 28px; }
        
        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #0ff, #f0f, #ff0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #0ff; font-weight: 600; margin-bottom: 8px; }
        
        input, select {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 20, 30, 0.9);
            border: 2px solid #0ff;
            border-radius: 20px;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            color: #0ff;
            outline: none;
        }
        
        input:focus, select:focus { box-shadow: 0 0 15px rgba(0,255,255,0.5); border-color: #f0f; }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Orbitron', monospace;
            transition: 0.3s;
            text-transform: uppercase;
        }
        
        .btn-primary { background: linear-gradient(95deg, #0ff, #0a8); color: #000; box-shadow: 0 0 15px rgba(0,255,255,0.3); }
        .btn-success { background: linear-gradient(95deg, #0f0, #0a0); color: #000; }
        .btn-danger { background: linear-gradient(95deg, #f00, #a00); color: #fff; }
        .btn-warning { background: linear-gradient(95deg, #ff0, #fa0); color: #000; }
        .btn-info { background: linear-gradient(95deg, #0ff, #0a8); color: #000; }
        .btn-secondary { background: linear-gradient(95deg, #888, #666); color: #fff; }
        
        .difficulty-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            justify-content: center;
        }
        
        .difficulty-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid;
            border-radius: 20px;
            background: rgba(0,0,0,0.5);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        
        .difficulty-btn.easy { border-color: #0f0; color: #0f0; }
        .difficulty-btn.easy.active, .difficulty-btn.easy:hover { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0; }
        .difficulty-btn.medium { border-color: #ff0; color: #ff0; }
        .difficulty-btn.medium.active, .difficulty-btn.medium:hover { background: #ff0; color: #000; box-shadow: 0 0 20px #ff0; }
        .difficulty-btn.hard { border-color: #f00; color: #f00; }
        .difficulty-btn.hard.active, .difficulty-btn.hard:hover { background: #f00; color: #fff; box-shadow: 0 0 20px #f00; }
        
        .question-card {
            background: linear-gradient(145deg, #0a1525, #010a15);
            border: 2px solid #0ff;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        
        .question-text { font-size: 1.4rem; font-weight: 700; color: #0ff; line-height: 1.4; }
        .answer-hint { background: rgba(0,255,255,0.1); border-radius: 40px; display: inline-block; padding: 6px 18px; margin-top: 12px; color: #ff0; }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 20px 0; }
        .option-btn { background: #0a1525; border: 1px solid #0ff; border-radius: 15px; padding: 10px; color: #0ff; text-align: center; }
        
        .buzzer-btn {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle at 30% 25%, #ff3366, #990033);
            border: 3px solid #ff0;
            border-radius: 50%;
            font-size: 24px;
            font-weight: 900;
            color: #ff0;
            cursor: pointer;
            box-shadow: 0 12px 0 0 #660022;
            transition: 0.05s linear;
            margin: 15px auto;
            display: block;
            font-family: 'Orbitron', monospace;
        }
        
        .buzzer-btn:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 6px 0 0 #660022; }
        .buzzer-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .alert-buzzer {
            background: rgba(0,0,0,0.8);
            border-right: 6px solid #ff0;
            padding: 15px;
            border-radius: 20px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        
        /* تنسيق اسم اللاعب الذي ضغط بلون أحمر */
        .buzzer-player-name {
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .buzzer-player-name.red-buzzer {
            color: #ff0000 !important;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
            animation: pulse 0.5s ease-in-out;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .leaderboard {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 20, 30, 0.8);
            border-radius: 16px;
            overflow: hidden;
            margin: 15px 0;
            border: 1px solid #0ff;
        }
        
        .leaderboard th, .leaderboard td { padding: 10px; text-align: center; color: #0ff; border-bottom: 1px solid rgba(0,255,255,0.2); }
        .leaderboard th { background: rgba(0,255,255,0.15); color: #ff0; }
        
        /* تنسيق صف اللاعب الذي ضغط في لوحة المتصدرين */
        .leaderboard tr.buzzer-highlight {
            background: rgba(255, 0, 0, 0.3);
            animation: blinkRow 0.5s ease-in-out 3;
        }
        
        .leaderboard tr.buzzer-highlight td {
            color: #ff6666;
            font-weight: bold;
        }
        
        @keyframes blinkRow {
            0% { background: rgba(255, 0, 0, 0.3); }
            50% { background: rgba(255, 0, 0, 0.6); }
            100% { background: rgba(255, 0, 0, 0.3); }
        }
        
        .winner-screen {
            background: linear-gradient(145deg, #0a1525, #000);
            border: 3px solid #ff0;
            border-radius: 32px;
            padding: 30px;
            text-align: center;
            margin-top: 20px;
        }
        
        .room-badge { background: rgba(0,255,255,0.15); border: 1px solid #0ff; padding: 6px 16px; border-radius: 40px; color: #0ff; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .hidden { display: none; }
        .kick-btn { background: #ff3366; border: none; border-radius: 8px; padding: 4px 10px; color: #fff; cursor: pointer; }
        .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0a1525; border: 2px solid #0ff; color: #0ff; padding: 12px 24px; border-radius: 40px; z-index: 1000; }
        
        .level-easy { background: #0f0; color: #000; }
        .level-medium { background: #ff0; color: #000; }
        .level-hard { background: #f00; color: #fff; }
        
        hr { margin: 20px 0; border-color: rgba(0,255,255,0.3); }
        
        .quiz-control-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .quiz-control-group .btn {
            flex: 1;
            min-width: 140px;
            font-size: 0.9rem;
            padding: 12px 12px;
        }
    </style>
</head>
<body>
    <div class="stars-bg" id="stars"></div>
    
    <div class="app-container">
        <div id="setup-screen" class="panel">
            <h1><i class="fas fa-globe-asia"></i> COSMIC QUIZ WARS <i class="fas fa-meteor"></i></h1>
            <div class="input-group">
                <label><i class="fas fa-user-astronaut"></i> اسم المحارب</label>
                <input type="text" id="user-name" placeholder="مثال: نجم المجرة" autocomplete="off">
            </div>
            <div id="admin-options">
                <div class="input-group">
                    <label><i class="fas fa-trophy"></i> هدف الفوز</label>
                    <select id="win-limit">
                        <option value="50">50 نقطة</option>
                        <option value="70" selected>70 نقطة</option>
                        <option value="100">100 نقطة</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="initAdmin()"><i class="fas fa-rocket"></i> إنشاء ساحة الحرب</button>
            </div>
            <hr>
            <div class="input-group">
                <label><i class="fas fa-key"></i> رمز المعركة</label>
                <input type="number" id="room-input" placeholder="أدخل الرقم السري">
            </div>
            <button class="btn btn-primary" style="background: linear-gradient(95deg, #f0f, #a0a);" onclick="joinRoom()"><i class="fas fa-users"></i> انضم كمتسابق</button>
        </div>

        <div id="admin-view" class="panel hidden">
            <div class="flex-between">
                <div class="room-badge"><i class="fas fa-hashtag"></i> ساحة: <span id="admin-room-id">---</span></div>
                <div class="room-badge"><i class="fas fa-flag-checkered"></i> الهدف: <span id="goal-display">--</span></div>
            </div>
            
            <div class="difficulty-buttons">
                <div class="difficulty-btn easy" onclick="setDifficulty('easy')">
                    <i class="fas fa-seedling"></i> سهل
                </div>
                <div class="difficulty-btn medium active" onclick="setDifficulty('medium')">
                    <i class="fas fa-chart-line"></i> متوسط
                </div>
                <div class="difficulty-btn hard" onclick="setDifficulty('hard')">
                    <i class="fas fa-dragon"></i> صعب
                </div>
            </div>
            
            <div class="category-row" style="display: flex; gap: 10px; margin: 15px 0;">
                <select id="category-select-live" style="flex: 2;">
                    <option value="general">📚 ثقافة عامة</option>
                    <option value="islam">🕌 إسلاميات</option>
                    <option value="science">🔬 علوم</option>
                    <option value="geography">🗺️ جغرافيا</option>
                    <option value="sports">⚽ رياضة</option>
                    <option value="arts">🎨 فنون</option>
                    <option value="history">🏛️ تاريخ</option>
                    <option value="technology">💻 تكنولوجيا</option>
                    <option value="entertainment">🎬 ترفيه</option>
                    <option value="medicine">💊 طب</option>
                    <option value="economy">📈 اقتصاد</option>
                </select>
                <button class="btn btn-info" onclick="loadQuestionByDifficultyAndCategory()"><i class="fas fa-sync-alt"></i> تحميل سؤال</button>
            </div>
            
            <div class="question-card">
                <div class="question-text"><span id="admin-q-text">اختر المستوى والمجال ثم اضغط تحميل</span></div>
                <div class="answer-hint"><i class="fas fa-microchip"></i> الإجابة: <span id="admin-a-text">...</span></div>
                
                <div class="quiz-control-group">
                    <button id="toggleQuestionBtn" class="btn btn-warning" onclick="toggleQuestionVisibility()">
                        <i class="fas fa-eye"></i> إظهار السؤال
                    </button>
                    <button id="toggleOptionsBtn" class="btn btn-secondary" onclick="toggleOptionsOnly()">
                        <i class="fas fa-lightbulb"></i> إظهار الاقتراحات
                    </button>
                </div>
            </div>
            
            <div id="buzzer-alert" class="alert-buzzer hidden">
                <span>
                    <i class="fas fa-bell" style="color:#ff0;"></i> 
                    <strong id="first-player-name" class="buzzer-player-name">...</strong> 
                    <span style="color:#ff0;">ضغط أولاً!</span>
                </span>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-success btn-sm" onclick="handleAnswer(true)">✅ صحيحة</button>
                    <button class="btn btn-danger btn-sm" onclick="handleAnswer(false)">❌ خاطئة</button>
                    <button class="btn btn-secondary btn-sm" onclick="skipBuzzer()">⏩ تخطي</button>
                </div>
            </div>
            
            <button class="btn btn-warning" onclick="nextQuestion()"><i class="fas fa-forward-step"></i> السؤال التالي</button>
            
            <h3 style="margin-top: 20px; color: #ff0;"><i class="fas fa-trophy"></i> ترتيب المحاربين</h3>
            <table class="leaderboard" id="admin-leaderboard">
                <thead><tr><th>#</th><th>اللاعب</th><th>⭐ النقاط</th><th>إجراء</th></tr></thead>
                <tbody id="admin-list"></tbody>
             </table>
        </div>

        <div id="guest-view" class="panel hidden">
            <div class="flex-between">
                <div class="room-badge"><i class="fas fa-door-open"></i> ساحة: <span id="guest-room-display"></span></div>
                <div class="room-badge"><i class="fas fa-flag-checkered"></i> الهدف: <span id="guest-goal-display">--</span></div>
            </div>
            <div id="game-content">
                <div class="question-card">
                    <div class="question-text"><span id="guest-q-text">🌟 انتظر إشارة البدء... 🌟</span></div>
                    <div id="guest-options-area" class="options-grid"></div>
                </div>
                
                <button id="buzzer-btn" class="buzzer-btn" onclick="pressBuzzer()">
                    <i class="fas fa-fist-raised"></i> BUZZ
                </button>
                <div id="msg-status" style="text-align: center; color: #ffd93d; margin: 10px 0;">
                    <i class="fas fa-microphone-alt"></i> اضغط الزر لتكون الأول!
                </div>
            </div>
            <div id="winner-screen" class="winner-screen hidden">
                <i class="fas fa-crown" style="font-size: 3rem; color:#ff0;"></i>
                <h2 style="color:#ff0;">البطل هو <span id="winner-name"></span>!</h2>
            </div>
            <h3 style="color:#ff0;"><i class="fas fa-ranking-star"></i> ترتيب المقاتلين</h3>
            <table class="leaderboard">
                <thead><tr><th>#</th><th>اللاعب</th><th>النقاط</th></tr></thead>
                <tbody id="guest-list"></tbody>
             </table>
        </div>
    </div>

        function showFloatingMessage(msg, success = false) {
            if(toastTimeout) clearTimeout(toastTimeout);
            document.querySelectorAll('.toast-msg').forEach(e => e.remove());
            let toast = document.createElement('div');
            toast.className = 'toast-msg';

            toastTimeout = setTimeout(() => toast.remove(), 2000);

        function setDifficulty(level) {
            currentDifficulty = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));

            showFloatingMessage(`تم اختيار مستوى ${level === 'easy' ? 'سهل' : level === 'medium' ? 'متوسط' : 'صعب'}`, true);
            if(isHost) loadQuestionByDifficultyAndCategory();
        }
        
        function loadQuestionByDifficultyAndCategory() {
            if (!isHost) return;
            const category = document.getElementById('category-select-live').value;
            const questionArray = questionsBank[currentDifficulty]?.[category];
            
            if (questionArray && questionArray.length > 0) {
                const randomIndex = Math.floor(Math.random() * questionArray.length);
                const questionData = questionArray[randomIndex];
                currentQuestionObj = {
                    q: questionData.q,
                    a: questionData.a,
                    options: questionData.options
                };
                document.getElementById('admin-q-text').innerText = currentQuestionObj.q;
                document.getElementById('admin-a-text').innerText = currentQuestionObj.a;
                
                if (currentRoom) {
                    db.ref(`rooms/${currentRoom}/currentQuestion`).set(currentQuestionObj);
                    db.ref(`rooms/${currentRoom}/currentDifficulty`).set(currentDifficulty);
                    db.ref(`rooms/${currentRoom}/currentCategory`).set(category);
                }
                showFloatingMessage(`تم تحميل سؤال ${currentDifficulty === 'easy' ? 'سهل' : currentDifficulty === 'medium' ? 'متوسط' : 'صعب'} من مجال ${category}`, true);
            } else {
                showFloatingMessage(`لا يوجد سؤال للمستوى ${currentDifficulty} في هذا المجال`, false);
            }
        }
        
        function toggleQuestionVisibility() {
            if (!isHost || !currentRoom) return;
            const roomRef = db.ref(`rooms/${currentRoom}`);
            roomRef.once('value', snapshot => {
                const data = snapshot.val();
                const currentVisible = (!data?.manualHideActive && data?.isQuestionVisible) ? true : false;
                const newVisible = !currentVisible;
                if(newVisible) {
                    roomRef.update({ isQuestionVisible: true, manualHideActive: false });
                    document.getElementById('toggleQuestionBtn').innerHTML = '<i class="fas fa-eye-slash"></i> إخفاء السؤال';
                    showFloatingMessage("تم إظهار السؤال للضيوف", true);
                } else {
                    roomRef.update({ isQuestionVisible: false, manualHideActive: true });
                    document.getElementById('toggleQuestionBtn').innerHTML = '<i class="fas fa-eye"></i> إظهار السؤال';
                    showFloatingMessage("تم إخفاء السؤال عن الضيوف", true);
                }
            });
        }
        
        function toggleOptionsOnly() {
            if (!isHost || !currentRoom) return;
            const roomRef = db.ref(`rooms/${currentRoom}`);
            roomRef.once('value', snapshot => {
                const currentShowOptions = snapshot.val()?.showOptions !== false;
                const newState = !currentShowOptions;
                roomRef.update({ showOptions: newState });
                const btn = document.getElementById('toggleOptionsBtn');
                if(newState) {
                    btn.innerHTML = '<i class="fas fa-eye-slash"></i> إخفاء الاقتراحات';
                    btn.classList.remove('btn-secondary');

            });
        }

            currentRoom = Math.floor(1000 + Math.random() * 9000);
            winScore = parseInt(document.getElementById('win-limit').value);
            
            const defaultCategory = "general";
            const defaultQuestionArray = questionsBank.medium[defaultCategory];
            if(defaultQuestionArray && defaultQuestionArray.length) currentQuestionObj = defaultQuestionArray[0];
            else currentQuestionObj = { q: "سؤال تجريبي", a: "إجابة", options: ["خيار1","خيار2"] };
            
            db.ref(`rooms/${currentRoom}`).set({
                winLimit: winScore,
                firstPress: null,
                winner: null,
                createdAt: Date.now(),
                hostName: myName,
                isQuestionVisible: false,
                manualHideActive: true,
                currentDifficulty: "medium",
                currentCategory: defaultCategory,
                currentQuestion: currentQuestionObj,
                showOptions: true
            });
            
            db.ref(`rooms/${currentRoom}/players/${myName}`).set({ name: myName, score: 0, isHost: true });
            document.getElementById('admin-room-id').innerText = currentRoom;

            document.getElementById('admin-a-text').innerText = currentQuestionObj.a;

        function joinRoom() {
            let name = document.getElementById('user-name').value.trim();
            if(!name) return showFloatingMessage("أدخل اسمك!", false);
            myName = name;
            let roomCode = document.getElementById('room-input').value.trim();
            if(!roomCode) return showFloatingMessage("أدخل رمز الساحة!", false);
            currentRoom = roomCode;
            db.ref(`rooms/${currentRoom}`).once('value', snap => {
                if(!snap.exists()) return showFloatingMessage("الساحة غير موجودة!", false);
                db.ref(`rooms/${currentRoom}/players/${myName}`).set({ name: myName, score: 0, isHost: false });
                showView('guest-view');
                document.getElementById('guest-room-display').innerText = currentRoom;
                startSync();
                showFloatingMessage("انضممت إلى ساحة المعركة!", true);
            });
        }

                    currentQuestionObj = snap.val();
                    if(document.getElementById('admin-q-text')) document.getElementById('admin-q-text').innerText = currentQuestionObj.q;
                    if(document.getElementById('admin-a-text')) document.getElementById('admin-a-text').innerText = currentQuestionObj.a;
                }
            });
            
            db.ref(`rooms/${currentRoom}`).on('value', snapshot => {
                let data = snapshot.val();
                if(!data) return;
                let visible = (!data.manualHideActive && data.isQuestionVisible);
                let showOpt = data.showOptions !== false;
                let guestQ = document.getElementById('guest-q-text');
                let guestOpts = document.getElementById('guest-options-area');
                if(guestQ && currentQuestionObj) {
                    if(!visible) {
                        guestQ.innerText = "🔒 السؤال مخفي... استعد للمعركة! 🔒";
                        guestOpts.innerHTML = "";
                    } else {
                        guestQ.innerText = currentQuestionObj.q;
                        if(showOpt && currentQuestionObj.options) {
                            guestOpts.innerHTML = currentQuestionObj.options.map(opt => `<div class="option-btn"><i class="fas fa-shield-alt"></i> ${opt}</div>`).join('');
                        } else {
                            guestOpts.innerHTML = `<div class="option-btn">🔮 الاقتراحات مخفية 🔮</div>`;
                        }
                    }
                }
                if(data.kicked && data.kicked[myName]) {
                    showFloatingMessage("⚠️ تم طردك من الساحة!", false);
                    setTimeout(() => location.reload(), 1500);
                }
            });
            
            db.ref(`rooms/${currentRoom}/firstPress`).on('value', snap => {
                let fp = snap.val();
                if(fp) {
                    lastBuzzerPlayer = fp;
                    document.getElementById('buzzer-alert')?.classList.remove('hidden');
                    const firstNameSpan = document.getElementById('first-player-name');
                    if(firstNameSpan) {
                        firstNameSpan.innerText = fp;
                        // تطبيق اللون الأحمر
                        highlightBuzzerPlayer(fp);
                        // تمييز صف اللاعب في لوحة المتصدرين
                        highlightPlayerRow(fp);
                    }
                    if(document.getElementById('msg-status')) document.getElementById('msg-status').innerHTML = `<i class="fas fa-bell"></i> ⚡ ${fp} ضغط أولاً! ⚡`;
                    document.getElementById('buzzer-btn')?.setAttribute('disabled', 'disabled');
                } else {
                    document.getElementById('buzzer-alert')?.classList.add('hidden');
                    if(document.getElementById('msg-status')) document.getElementById('msg-status').innerHTML = `<i class="fas fa-fist-raised"></i> اضغط الزر لتكون الأول!`;
                    document.getElementById('buzzer-btn')?.removeAttribute('disabled');
                    // إزالة التمييز عند إعادة تعيين الضغط
                    removeAllRowHighlights();
                }
            });
            
            db.ref(`rooms/${currentRoom}/players`).on('value', snap => {
                let players = snap.val() || {};
                let filtered = Object.values(players).filter(p => !p.isHost);
                filtered.sort((a, b) => b.score - a.score);
                let adminHtml = "", guestHtml = "", r = 1;
                for(let p of filtered) {
                    adminHtml += `<tr id="player-row-${p.name.replace(/\s/g, '')}">
                        <td>${r++}</td>
                        <td><i class="fas fa-user-astronaut"></i> ${p.name}</td>
                        <td style="color:#ffd93d;">${p.score}</td>
                        <td><button class="kick-btn" onclick="kickPlayer('${p.name.replace(/'/g, "\\'")}')"><i class="fas fa-trash"></i> طرد</button></td>
                    </tr>`;
                }
                r = 1;
                for(let p of filtered) {
                    guestHtml += `<tr><td>${r++}</td><td><i class="fas fa-user"></i> ${p.name}</td><td>🏅 ${p.score}</td></tr>`;
                }
                document.getElementById('admin-list').innerHTML = adminHtml || '<tr><td colspan="4">لا يوجد متسابقون بعد</td></tr>';
                document.getElementById('guest-list').innerHTML = guestHtml || '<tr><td colspan="3">لا يوجد متسابقون بعد</td></tr>';
                
                // إعادة تطبيق التمييز إذا كان هناك لاعب ضغط سابق
                if (lastBuzzerPlayer) {
                    highlightPlayerRow(lastBuzzerPlayer);
                }
                
                for(let p of filtered) {
                    if(p.score >= winScore) db.ref(`rooms/${currentRoom}/winner`).set(p.name);
                }
            });
            
            db.ref(`rooms/${currentRoom}/winner`).on('value', snap => {
                let w = snap.val();
                if(w) {
                    document.getElementById('game-content').classList.add('hidden');
                    document.getElementById('winner-screen').classList.remove('hidden');
                    document.getElementById('winner-name').innerText = w;
                    if(document.getElementById('buzzer-btn')) document.getElementById('buzzer-btn').disabled = true;
                    showFloatingMessage(`🏆 البطل ${w} انتصر في المعركة! 🏆`, true);
                } else if(document.getElementById('game-content')?.classList.contains('hidden')) {
                    document.getElementById('game-content').classList.remove('hidden');
                    document.getElementById('winner-screen').classList.add('hidden');
                }
            });
        }
        
        function pressBuzzer() {
            if(currentRoom) {
                db.ref(`rooms/${currentRoom}/firstPress`).transaction(cur => cur === null ? myName : cur);
            }
        }
        
        function nextQuestion() {
            loadQuestionByDifficultyAndCategory();
            db.ref(`rooms/${currentRoom}/firstPress`).set(null);
            db.ref(`rooms/${currentRoom}/currentQuestion`).set(currentQuestionObj);
            lastBuzzerPlayer = null;
            showFloatingMessage("السؤال التالي!", true);
        }
        
        function handleAnswer(correct) {
            db.ref(`rooms/${currentRoom}/firstPress`).once('value', snap => {
                let p = snap.val();
                if(!p) return showFloatingMessage("لا يوجد لاعب ضغط!", false);
                if(correct) {
                    db.ref(`rooms/${currentRoom}/players/${p}/score`).transaction(s => (s || 0) + 10);
                    showFloatingMessage(`✔️ إجابة صحيحة للاعب ${p} +10 نقاط`, true);
                    nextQuestion();
                } else {
                    db.ref(`rooms/${currentRoom}/players/${p}/score`).transaction(s => (s || 0) - 5);
                    showFloatingMessage(`❌ إجابة خاطئة للاعب ${p} -5 نقاط`, false);
                    db.ref(`rooms/${currentRoom}/firstPress`).set(null);
                }
            });
        }
        
        function kickPlayer(playerName) {
            if(!isHost) return;
            db.ref(`rooms/${currentRoom}/players/${playerName}`).remove();
            db.ref(`rooms/${currentRoom}/kicked/${playerName}`).set(true);
            showFloatingMessage(`تم طرد ${playerName} من الساحة`, false);
        }
        
        window.initAdmin = initAdmin;
        window.joinRoom = joinRoom;
        window.setDifficulty = setDifficulty;
        window.loadQuestionByDifficultyAndCategory = loadQuestionByDifficultyAndCategory;
        window.pressBuzzer = pressBuzzer;
        window.nextQuestion = nextQuestion;
        window.handleAnswer = handleAnswer;
        window.toggleQuestionVisibility = toggleQuestionVisibility;
        window.toggleOptionsOnly = toggleOptionsOnly;
        window.kickPlayer = kickPlayer;
        window.skipBuzzer = skipBuzzer;
    </script>
</body>
</html>
